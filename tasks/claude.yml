---
- name: Ensure ~/.claude/ directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude"
    state: directory
    mode: "0755"

- name: Copy CLAUDE.md
  ansible.builtin.copy:
    src: files/claude/CLAUDE.md
    dest: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
    backup: yes
    mode: "0664"

- name: Copy settings.json
  ansible.builtin.copy:
    src: files/claude/settings.json
    dest: "{{ ansible_env.HOME }}/.claude/settings.json"
    backup: yes
    mode: "0664"

- name: Ensure ~/.claude/agents/ directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/agents"
    state: directory
    mode: "0755"

- name: Copy claude agents
  ansible.builtin.copy:
    src: "files/claude/agents/"
    dest: "{{ ansible_env.HOME }}/.claude/agents/"
    backup: yes
    mode: "0664"

- name: Install claude skill {{ item }}
  ansible.builtin.command:
    cmd: npx skills add composiohq/awesome-claude-skills@{{ item }} -g -y
    creates: "{{ ansible_env.HOME }}/.claude/skills/{{ item }}"
  loop: "{{ claude_skills }}"

- name: Add claude plugin marketplace {{ item.name }}
  ansible.builtin.command:
    cmd: claude plugin marketplace add {{ item.repo }}
    creates: "{{ ansible_env.HOME }}/.claude/plugins/marketplaces/{{ item.name }}"
  loop: "{{ claude_marketplaces }}"

- name: Install claude plugin {{ item }}
  ansible.builtin.command:
    cmd: claude plugin install {{ item }}
    creates: "{{ ansible_env.HOME }}/.claude/plugins/cache/{{ item.split('@')[1] }}/{{ item.split('@')[0] }}"
  loop: "{{ claude_plugins }}"

- name: Ensure ~/.config/ccstatusline/ directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/ccstatusline"
    state: directory
    mode: "0755"

- name: Copy ccstatusline settings.json
  ansible.builtin.copy:
    src: files/.config/ccstatusline/settings.json
    dest: "{{ ansible_env.HOME }}/.config/ccstatusline/settings.json"
    backup: yes
    mode: "0664"
